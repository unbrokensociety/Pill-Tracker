name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon || gradle assembleDebug

    - name: Prepare Named APK
      run: |
        cp app/build/outputs/apk/debug/*.apk pill-tracker.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pill-tracker
        path: pill-tracker.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
      with:
        tag_name: v1.${{ github.run_number }}
        name: "Pill Tracker v1.${{ github.run_number }}"
        body: "Готовая сборка приложения Pill Tracker (Версия 1.${{ github.run_number }})."
        files: pill-tracker.apk

