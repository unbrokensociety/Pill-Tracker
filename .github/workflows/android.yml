name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Setup environment variables
      run: |
        if [ ! -f ".env" ] && [ -f ".env.example" ]; then
          cp .env.example .env
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          python3 -c "import base64; open('debug.keystore','wb').write(base64.b64decode(open('debug.keystore.base64').read().strip()))"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Prepare Named APK
      run: |
        cp app/build/outputs/apk/debug/*.apk pill-tracker.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pill-tracker
        path: pill-tracker.apk

    - name: Generate Release Changelog
      run: |
        if [ ! -s "RELEASE_NOTES.md" ]; then
          echo "### 🚀 What's New in Version 1.${{ github.run_number }}:" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- 🔐 **Seamless Email Verification**: Automatic verification link polling and account activation." >> RELEASE_NOTES.md
          echo "- 🚀 **Instant Offline Mode**: Continue using the app immediately while waiting for verification." >> RELEASE_NOTES.md
          echo "- 📜 **Legal Privacy Consent**: Mandatory privacy policy agreement and immutable audit record." >> RELEASE_NOTES.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v1.${{ github.run_number }}
        name: "Pill Tracker v1.${{ github.run_number }}"
        body_path: RELEASE_NOTES.md
        files: pill-tracker.apk
        overwrite: true

