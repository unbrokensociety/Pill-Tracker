name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon || gradle assembleDebug

    - name: Prepare Named APK
      run: |
        cp app/build/outputs/apk/debug/*.apk pill-tracker.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pill-tracker
        path: pill-tracker.apk

    - name: Generate Release Changelog
      run: |
        echo "### 🚀 What's New in Version 1.${{ github.run_number }}:" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "- 🧪 **Liquid Glass UI**: Added experimental glassmorphic container with hardware background blur (\`RenderEffect\`) and subtle light borders." >> RELEASE_NOTES.md
        echo "- 🎯 **Smooth Tab Navigation**: Integrated smooth sliding liquid pill indicator for bottom tab navigation with spring physics." >> RELEASE_NOTES.md
        echo "- ⏰ **Exact Alarm Engine**: Upgraded alarm triggers to \`setAlarmClock\` for exact time firing without system Doze mode delays." >> RELEASE_NOTES.md
        echo "- 📐 **Layout Alignment**: Centered empty states and text cards across 'My Medications' and 'Home' screens." >> RELEASE_NOTES.md
        echo "- 🏷️ **Dynamic Versioning**: Automatically syncs version display in 'About Application' to match build releases (v1.${{ github.run_number }})." >> RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
      with:
        tag_name: v1.${{ github.run_number }}
        name: "Pill Tracker v1.${{ github.run_number }}"
        body_path: RELEASE_NOTES.md
        files: pill-tracker.apk

