name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon || gradle assembleDebug

    - name: Prepare Named APK
      run: |
        cp app/build/outputs/apk/debug/*.apk pill-tracker.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pill-tracker
        path: pill-tracker.apk

    - name: Generate Release Changelog
      run: |
        echo "### 🚀 What's New in Version 1.${{ github.run_number }}:" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "- 🎯 **Floating Sliding Indicator**: Integrated smooth sliding pill indicator for floating navigation capsule with spring physics." >> RELEASE_NOTES.md
        echo "- 📅 **Calendar Formatting**: Corrected Russian month names in calendar header to nominative standalone case (\"Июль\" instead of \"Июля\")." >> RELEASE_NOTES.md
        echo "- 🔥 **Medication Streak & Motivation**: Introduced daily intake streak tracking with motivational progress badge and flame indicator." >> RELEASE_NOTES.md
        echo "- ⚡ **144Hz Display Mode**: Optimized high refresh rate support (120Hz/144Hz) for fluid animations." >> RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
      with:
        tag_name: v1.${{ github.run_number }}
        name: "Pill Tracker v1.${{ github.run_number }}"
        body_path: RELEASE_NOTES.md
        files: pill-tracker.apk

